<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>md2mindmap</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <a class="brand" href="./" title="md2mindmap">
      <span class="brand-md">md</span>
      <!-- the token branches into the word: the tool's job, drawn -->
      <svg class="brand-arrow" viewBox="0 0 30 22" fill="none" aria-hidden="true">
        <path d="M5 11 C 13 11, 15 5, 24 5" stroke="#93A0B1" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M5 11 C 13 11, 15 17, 24 17" stroke="#93A0B1" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="4" cy="11" r="2.1" fill="#EAF0F7"/>
        <circle cx="25" cy="5" r="2.4" fill="#5B93FF"/>
        <circle cx="25" cy="17" r="2.4" fill="#E0457B"/>
      </svg>
      <span class="brand-map">mindmap</span>
    </a>

    <div class="readout" id="readout"></div>

    <span class="spacer"></span>

    <div class="group">
      <label class="btn accent" title="Open a Markdown file">
        Open .md
        <input type="file" id="file" accept=".md,.markdown,text/markdown" />
      </label>
      <button class="btn" id="load-sample">Sample</button>
    </div>

    <span class="rule"></span>

    <div class="group">
      <button class="btn on" id="toggle-editor" aria-pressed="true" title="Show or hide the editor">Editor</button>
      <button class="btn icon" id="zoom-out" title="Zoom out">&minus;</button>
      <button class="btn icon" id="zoom-in" title="Zoom in">+</button>
      <button class="btn" id="fit">Fit</button>
    </div>

    <span class="rule"></span>

    <div class="group">
      <button class="btn" id="expand-all">Expand</button>
      <button class="btn" id="collapse-all">Collapse</button>
      <button class="btn" id="export">Export SVG</button>
    </div>
  </header>

  <div class="workspace" id="workspace">
    <section class="editor" id="editor">
      <div class="editor-head">
        <span class="editor-name">outline.md</span>
        <span class="editor-stat" id="editor-stat"></span>
      </div>
      <textarea class="editor-area" id="src" spellcheck="false"
        placeholder="Write a nested Markdown outline — # Title, then indented - bullets. Lines starting with Q: turn red."></textarea>
    </section>

    <div class="resizer" id="resizer" title="Drag to resize"></div>

    <div class="stage" id="stage">
      <svg id="mindmap" xmlns="http://www.w3.org/2000/svg"></svg>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <div class="drop-veil" id="drop-veil">Release to render this outline</div>
      <div class="empty-hint" id="hint"></div>
    </div>
  </div>
</div>

<script src="mindmap.js?v=5"></script>
<script>
(function () {
  "use strict";
  const KEY = "md2mindmap:doc";
  const svg = document.getElementById("mindmap");
  const hint = document.getElementById("hint");
  const fileInput = document.getElementById("file");
  const fitBtn = document.getElementById("fit");
  const readout = document.getElementById("readout");
  const stage = document.getElementById("stage");
  const src = document.getElementById("src");
  const statEl = document.getElementById("editor-stat");
  const workspace = document.getElementById("workspace");
  const resizer = document.getElementById("resizer");
  const toggleBtn = document.getElementById("toggle-editor");

  // Read the loaded outline's shape for the instrument telemetry: how many
  // top-level branches, how deep it nests, and how many open questions (`Q:`).
  function telemetry(tree) {
    let branches = tree.children.length, levels = 0, open = 0;
    (function walk(n) {
      if (n.q) open++;
      if (n.depth > levels) levels = n.depth;
      n.children.forEach(walk);
    })(tree);
    return { branches, levels, open };
  }

  function paintReadout(tree) {
    const t = telemetry(tree);
    if (!t.branches) { readout.innerHTML = ""; return; }
    let html =
      '<span><b>' + t.branches + '</b> ' + (t.branches === 1 ? "branch" : "branches") + '</span>' +
      '<span class="dot"></span>' +
      '<span><b>' + t.levels + '</b> ' + (t.levels === 1 ? "level" : "levels") + '</span>';
    if (t.open) {
      html += '<span class="dot"></span><span class="r-open"><b>' + t.open + '</b> open</span>';
    }
    readout.innerHTML = html;
  }

  // mindmap.js owns parsing, layout, pan/zoom and collapse; the page feeds it
  // Markdown, reads the returned tree for telemetry, and shows an empty-state.
  function render(md) {
    fitBtn.textContent = "Fit";
    try {
      const ctrl = window.Mindmap.render(svg, md);
      paintReadout(ctrl.tree);
      const empty = ctrl.tree.children.length === 0;
      hint.innerHTML = empty
        ? "Start with a <code># Title</code>, then indented <code>-</code> bullets — the map draws as you type."
        : "";
      hint.style.display = empty ? "" : "none";
    } catch (e) {
      console.error("[md2mindmap] render failed:", e);
      readout.innerHTML = "";
      hint.innerHTML = "Couldn't render that outline: " + e.message;
      hint.style.display = "";
    }
  }

  function updateStat() {
    const lines = src.value ? src.value.split(/\n/).length : 0;
    statEl.textContent = lines + (lines === 1 ? " line" : " lines");
  }

  function persist() { try { localStorage.setItem(KEY, src.value); } catch (e) {} }

  // Push the editor's content into the map + storage.
  function sync() { render(src.value); persist(); updateStat(); }

  function debounce(fn, ms) { let t; return function () { clearTimeout(t); t = setTimeout(fn, ms); }; }
  const syncDebounced = debounce(sync, 360);

  // Load a document into the editor and render it immediately.
  function setDoc(text) { src.value = text; sync(); }

  src.addEventListener("input", syncDebounced);

  // Tab inserts two spaces rather than moving focus — outlines are all indent.
  src.addEventListener("keydown", function (e) {
    if (e.key === "Tab" && !e.shiftKey) {
      e.preventDefault();
      const s = src.selectionStart, en = src.selectionEnd;
      src.value = src.value.slice(0, s) + "  " + src.value.slice(en);
      src.selectionStart = src.selectionEnd = s + 2;
      syncDebounced();
    }
  });

  function loadFile(f) {
    const r = new FileReader();
    r.onload = () => setDoc(String(r.result));
    r.readAsText(f);
  }
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  // Drag a .md onto the canvas → load it into the editor.
  let dragDepth = 0;
  stage.addEventListener("dragenter", (e) => { e.preventDefault(); if (dragDepth++ === 0) stage.classList.add("dragging"); });
  stage.addEventListener("dragover", (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; });
  stage.addEventListener("dragleave", (e) => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; stage.classList.remove("dragging"); } });
  stage.addEventListener("drop", (e) => {
    e.preventDefault();
    dragDepth = 0; stage.classList.remove("dragging");
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) loadFile(f);
  });

  document.getElementById("load-sample").addEventListener("click", () => setDoc(SAMPLE));

  document.getElementById("zoom-in").addEventListener("click", () => window.Mindmap.zoomIn());
  document.getElementById("zoom-out").addEventListener("click", () => window.Mindmap.zoomOut());

  // Fit toggles between the whole-map overview and the readable (opened) view.
  fitBtn.addEventListener("click", () => {
    const full = window.Mindmap.toggleFit();
    fitBtn.textContent = full ? "Readable" : "Fit";
  });

  document.getElementById("expand-all").addEventListener("click", () => {
    window.Mindmap.expandAll();
    fitBtn.textContent = "Fit";
  });
  document.getElementById("collapse-all").addEventListener("click", () => {
    window.Mindmap.collapseAll();
    fitBtn.textContent = "Fit";
  });

  document.getElementById("export").addEventListener("click", () => {
    const xml = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([xml], { type: "image/svg+xml" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "mindmap.svg";
    a.click();
  });

  // Show / hide the editor pane.
  toggleBtn.addEventListener("click", () => {
    const hidden = workspace.classList.toggle("no-editor");
    toggleBtn.classList.toggle("on", !hidden);
    toggleBtn.setAttribute("aria-pressed", String(!hidden));
  });

  // Drag the handle to resize the editor.
  let rz = null;
  resizer.addEventListener("mousedown", (e) => {
    const cur = parseInt(getComputedStyle(workspace).getPropertyValue("--editor-w"), 10) || 360;
    rz = { x: e.clientX, w: cur };
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (!rz) return;
    let w = Math.max(240, Math.min(680, rz.w + (e.clientX - rz.x)));
    workspace.style.setProperty("--editor-w", w + "px");
  });
  window.addEventListener("mouseup", () => {
    if (rz) { rz = null; document.body.style.cursor = ""; document.body.style.userSelect = ""; }
  });

  // inline sample — built as an array of lines joined by real newlines, so it
  // does not depend on how the editor escapes \n in the source string.
  const SAMPLE = [
    "# Tinder App Brainstorm",
    "- Matching",
    "  - Swipe screen",
    "    - Default state",
    "    - Empty state (no more profiles)",
    "    - Q: mutual-like vs. algorithm-based matching?",
    "  - Match popup",
    "    - Q: can the user undo a match?",
    "    - Animated reveal",
    "- Onboarding",
    "  - Phone verification",
    "    - SMS OTP",
    "    - Q: support email login too?",
    "  - Profile setup",
    "    - Photos (up to 6)",
    "    - Bio (max 500 chars)",
    "    - Q: required prompts like Hinge?",
    "- Chat",
    "  - Text messages",
    "    - Read receipts",
    "    - Q: typing indicator needed?",
    "  - Media",
    "    - Image sharing",
    "    - Q: voice notes in v1?",
    "- Profile",
    "  - Viewing others",
    "    - Distance display",
    "    - Q: show last-active timestamp?",
    "  - Editing own",
    "    - Reorder photos",
    "- Settings",
    "  - Account",
    "    - Delete account",
    "    - Q: grace period before wipe?",
    "  - Notifications",
    "    - Push toggle",
    "- Safety",
    "  - Reporting",
    "    - Report user",
    "    - Block user",
    "  - Verification badge",
    "    - Photo verification",
    "    - Q: require ID for verification?",
  ].join("\n");

  // On load, restore the last outline (or fall back to the sample) and render.
  let initial = null;
  try { initial = localStorage.getItem(KEY); } catch (e) {}
  setDoc(initial == null ? SAMPLE : initial);
})();
</script>
</body>
</html>
